<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="MIDIGI Marketing">
  <rect width="1200" height="630" fill="#020617"/>
  <circle cx="190" cy="120" r="210" fill="#2563EB" opacity=".23"/>
  <circle cx="1040" cy="80" r="210" fill="#06B6D4" opacity=".16"/>
  <rect x="90" y="88" width="1020" height="454" rx="30" fill="#0F172A" opacity=".82" stroke="#1E293B"/>
  <text x="130" y="200" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="82" font-weight="800">MIDIGI</text>
  
  <!-- Wrap text into two lines -->
  <text x="130" y="280" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="42" font-weight="700">Marketing tăng trưởng cho</text>
  <text x="130" y="335" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="42" font-weight="700">doanh nghiệp Việt</text>
  
