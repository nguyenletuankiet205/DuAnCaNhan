  <text x="162" y="501" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="22" font-weight="700">Tư vấn miễn phí</text>
  
  <!-- Move icon block to the right using group translate -->
  <g transform="translate(60, -20)">
    <rect x="760" y="170" width="250" height="210" rx="18" fill="#020617" stroke="#1E293B"/>
    <path d="M797 329C827 281 861 306 888 258C915 210 948 234 982 196" fill="none" stroke="#06B6D4" stroke-width="12" stroke-linecap="round"/>
    <rect x="797" y="407" width="168" height="12" rx="6" fill="#1E40AF"/>
